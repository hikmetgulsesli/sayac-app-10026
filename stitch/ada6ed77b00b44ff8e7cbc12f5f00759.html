<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#c0c7d6",
                    "surface-bright": "#39383e",
                    "on-tertiary-container": "#39404d",
                    "surface": "#131318",
                    "primary-container": "#22c55e",
                    "inverse-primary": "#006e2f",
                    "surface-container": "#1f1f25",
                    "on-tertiary-fixed": "#151c27",
                    "tertiary-fixed": "#dce2f3",
                    "secondary-fixed": "#ffdad7",
                    "background": "#131318",
                    "surface-dim": "#131318",
                    "on-secondary-container": "#ffaea8",
                    "inverse-surface": "#e4e1e9",
                    "surface-variant": "#35343a",
                    "on-tertiary": "#2a313d",
                    "primary": "#4be277",
                    "on-secondary-fixed-variant": "#930013",
                    "outline-variant": "#3d4a3d",
                    "on-primary-fixed": "#002109",
                    "error-container": "#93000a",
                    "on-secondary": "#68000a",
                    "secondary-container": "#a40217",
                    "inverse-on-surface": "#303036",
                    "surface-container-high": "#2a292f",
                    "secondary": "#ffb3ad",
                    "on-surface": "#e4e1e9",
                    "on-error": "#690005",
                    "primary-fixed-dim": "#4ae176",
                    "on-primary-fixed-variant": "#005321",
                    "tertiary": "#c0c7d7",
                    "on-primary": "#003915",
                    "surface-container-low": "#1b1b20",
                    "surface-tint": "#4ae176",
                    "on-surface-variant": "#bccbb9",
                    "on-secondary-fixed": "#410004",
                    "on-tertiary-fixed-variant": "#404754",
                    "surface-container-lowest": "#0e0e13",
                    "on-primary-container": "#004b1e",
                    "tertiary-container": "#a5acbb",
                    "on-error-container": "#ffdad6",
                    "outline": "#869585",
                    "error": "#ffb4ab",
                    "on-background": "#e4e1e9",
                    "surface-container-highest": "#35343a",
                    "primary-fixed": "#6bff8f",
                    "secondary-fixed-dim": "#ffb3ad"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .numeric-shadow {
            text-shadow: 0 0 40px rgba(75, 226, 119, 0.15);
        }
        body {
            background-color: #131318;
        }
    </style>
</head>
<body class="font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#131318] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-2">
<span class="text-xl font-bold text-[#e4e1e9] font-['Space_Grotesk'] tracking-tight">Sayaç Pro</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-[#1b1b20] transition-colors text-[#e4e1e9] scale-95 duration-200">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<main class="min-h-[calc(100vh-140px)] flex flex-col items-center justify-center px-6 pb-24">
<!-- Counter Canvas (The Obsidian Chronometer) -->
<section class="w-full max-w-md flex flex-col items-center">
<!-- Metadata Area (Asymmetric Placement) -->
<div class="w-full flex justify-between items-end mb-8 px-2">
<div class="flex flex-col">
<span class="text-[11px] uppercase tracking-[0.2em] text-on-surface-variant/60 font-medium">Oturum Durumu</span>
<span class="text-primary font-semibold text-sm tracking-wide">Beklemede</span>
</div>
<div class="text-right">
<span class="text-[11px] uppercase tracking-[0.2em] text-on-surface-variant/60 font-medium">Hedef</span>
<span class="text-on-surface font-semibold text-sm tracking-wide">—</span>
</div>
</div>
<!-- Primary Counter Card -->
<div class="w-full aspect-square bg-surface-container-highest rounded-[3rem] flex flex-col items-center justify-center relative overflow-hidden group">
<!-- Atmospheric Background Texture -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-50"></div>
<!-- The Core Number -->
<div class="relative z-10 flex flex-col items-center">
<h1 class="text-[8rem] md:text-[10rem] font-headline font-light text-on-surface leading-none numeric-shadow">
                        0
                    </h1>
<p class="text-on-surface-variant/40 text-xs uppercase tracking-[0.3em] font-bold mt-2">Toplam Sayım</p>
</div>
<!-- Empty State Tip -->
<div class="absolute bottom-12 z-10 bg-surface-container-low/80 backdrop-blur-md px-6 py-3 rounded-full border border-outline-variant/10">
<p class="text-on-surface text-sm font-medium tracking-tight">Başlamak için butonları kullanın</p>
</div>
</div>
<!-- Interactive Zone (The "Power" Buttons) -->
<div class="w-full grid grid-cols-2 gap-4 mt-8">
<!-- Decrement Button -->
<button class="group flex flex-col items-center justify-center p-8 bg-surface-container-low rounded-xl active:scale-95 transition-all duration-150 border border-outline-variant/5">
<span class="material-symbols-outlined text-secondary text-3xl mb-2">remove</span>
<span class="text-on-surface font-bold text-lg">Azalt</span>
</button>
<!-- Increment Button -->
<button class="group flex flex-col items-center justify-center p-8 bg-gradient-to-br from-primary to-primary-container rounded-xl active:scale-95 transition-all duration-150 shadow-[0_10px_30px_rgba(75,226,119,0.2)]">
<span class="material-symbols-outlined text-on-primary text-3xl mb-2" style="font-variation-settings: 'FILL' 1;">add</span>
<span class="text-on-primary font-bold text-lg">Artır</span>
</button>
</div>
<!-- Utility Row -->
<div class="w-full flex justify-end mt-6">
<button class="flex items-center gap-3 px-6 py-3 bg-surface-container-low rounded-full hover:bg-surface-container-high transition-colors text-tertiary group">
<span class="material-symbols-outlined text-lg group-hover:rotate-180 transition-transform duration-500">restart_alt</span>
<span class="text-sm font-bold tracking-wide uppercase">Sıfırla</span>
</button>
</div>
</section>
<!-- Dynamic Data Visual (Atmospheric) -->
<div class="w-full max-w-4xl mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="bg-surface-container-low p-6 rounded-3xl flex items-center gap-4 border border-outline-variant/10">
<div class="w-12 h-12 rounded-2xl bg-surface-variant flex items-center justify-center text-primary">
<span class="material-symbols-outlined">trending_up</span>
</div>
<div>
<p class="text-on-surface-variant/60 text-[10px] uppercase tracking-widest font-bold">Ortalama</p>
<p class="text-on-surface font-headline text-xl">0.0</p>
</div>
</div>
<div class="bg-surface-container-low p-6 rounded-3xl flex items-center gap-4 border border-outline-variant/10">
<div class="w-12 h-12 rounded-2xl bg-surface-variant flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined">schedule</span>
</div>
<div>
<p class="text-on-surface-variant/60 text-[10px] uppercase tracking-widest font-bold">Süre</p>
<p class="text-on-surface font-headline text-xl">00:00</p>
</div>
</div>
<div class="bg-surface-container-low p-6 rounded-3xl flex items-center gap-4 border border-outline-variant/10">
<div class="w-12 h-12 rounded-2xl bg-surface-variant flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">history</span>
</div>
<div>
<p class="text-on-surface-variant/60 text-[10px] uppercase tracking-widest font-bold">Son İşlem</p>
<p class="text-on-surface font-headline text-xl">—</p>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-3 px-4 bg-[#131318] z-50 rounded-t-xl border-t border-[#3d4a3d]/15 shadow-[0_-4px_20px_rgba(75,226,119,0.06)]">
<!-- Ana Sayfa (Active) -->
<a class="flex flex-col items-center justify-center text-[#4be277] font-bold transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-widest mt-1">Ana Sayfa</span>
</a>
<!-- Geçmiş -->
<a class="flex flex-col items-center justify-center text-[#c0c7d7] opacity-60 hover:text-[#4be277] transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-widest mt-1">Geçmiş</span>
</a>
<!-- Ayarlar -->
<a class="flex flex-col items-center justify-center text-[#c0c7d7] opacity-60 hover:text-[#4be277] transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-widest mt-1">Ayarlar</span>
</a>
</nav>
</body></html>
