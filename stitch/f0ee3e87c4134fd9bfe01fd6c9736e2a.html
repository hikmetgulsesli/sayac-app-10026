<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sayaç Pro - Sayaç Uygulaması</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#c0c7d6",
                    "surface-bright": "#39383e",
                    "on-tertiary-container": "#39404d",
                    "surface": "#131318",
                    "primary-container": "#22c55e",
                    "inverse-primary": "#006e2f",
                    "surface-container": "#1f1f25",
                    "on-tertiary-fixed": "#151c27",
                    "tertiary-fixed": "#dce2f3",
                    "secondary-fixed": "#ffdad7",
                    "background": "#131318",
                    "surface-dim": "#131318",
                    "on-secondary-container": "#ffaea8",
                    "inverse-surface": "#e4e1e9",
                    "surface-variant": "#35343a",
                    "on-tertiary": "#2a313d",
                    "primary": "#4be277",
                    "on-secondary-fixed-variant": "#930013",
                    "outline-variant": "#3d4a3d",
                    "on-primary-fixed": "#002109",
                    "error-container": "#93000a",
                    "on-secondary": "#68000a",
                    "secondary-container": "#a40217",
                    "inverse-on-surface": "#303036",
                    "surface-container-high": "#2a292f",
                    "secondary": "#ffb3ad",
                    "on-surface": "#e4e1e9",
                    "on-error": "#690005",
                    "primary-fixed-dim": "#4ae176",
                    "on-primary-fixed-variant": "#005321",
                    "tertiary": "#c0c7d7",
                    "on-primary": "#003915",
                    "surface-container-low": "#1b1b20",
                    "surface-tint": "#4ae176",
                    "on-surface-variant": "#bccbb9",
                    "on-secondary-fixed": "#410004",
                    "on-tertiary-fixed-variant": "#404754",
                    "surface-container-lowest": "#0e0e13",
                    "on-primary-container": "#004b1e",
                    "tertiary-container": "#a5acbb",
                    "on-error-container": "#ffdad6",
                    "outline": "#869585",
                    "error": "#ffb4ab",
                    "on-background": "#e4e1e9",
                    "surface-container-highest": "#35343a",
                    "primary-fixed": "#6bff8f",
                    "secondary-fixed-dim": "#ffb3ad"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #131318;
            color: #e4e1e9;
        }
        .display-lg {
            font-size: 6rem;
            line-height: 1;
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-[#131318] flex justify-between items-center px-6 py-4 w-full z-50">
<div class="flex items-center gap-2">
<span class="text-xl font-bold text-[#e4e1e9] font-['Space_Grotesk'] tracking-tight">Sayaç Pro</span>
</div>
<div class="flex items-center gap-4">
<button class="text-[#e4e1e9] hover:bg-[#1b1b20] transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 pb-24">
<!-- Brand / Header Section -->
<div class="text-center mb-12">
<h1 class="font-headline text-3xl font-extrabold tracking-tight mb-2">Sayaç Uygulaması</h1>
<p class="font-body text-on-surface-variant text-sm opacity-60">Hassas Sayım ve Takip Paneli</p>
</div>
<!-- Main Counter Card -->
<div class="w-full max-w-md bg-surface-container-highest rounded-[2rem] p-8 flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative atmospheric glow -->
<div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/5 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-24 -right-24 w-48 h-48 bg-secondary-container/5 rounded-full blur-[80px]"></div>
<!-- Numeric Display -->
<div class="relative z-10 py-12 flex flex-col items-center">
<span class="font-body text-[11px] uppercase tracking-[0.2em] text-on-surface-variant mb-4">Mevcut Değer</span>
<span class="display-lg font-bold text-primary tracking-tighter">42</span>
</div>
<!-- Action Controls -->
<div class="w-full grid grid-cols-3 gap-4 mt-8 relative z-10">
<!-- Azalt Button -->
<button class="flex flex-col items-center justify-center gap-2 p-6 rounded-xl bg-secondary-container bg-opacity-20 text-error hover:bg-opacity-30 transition-all active:scale-95 duration-150 group">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center mb-1 shadow-lg">
<span class="material-symbols-outlined text-white" data-icon="remove">remove</span>
</div>
<span class="font-label text-sm font-semibold">Azalt</span>
</button>
<!-- Sıfırla Button -->
<button class="flex flex-col items-center justify-center gap-2 p-6 rounded-xl bg-surface-container-low text-tertiary hover:bg-surface-variant transition-all active:scale-95 duration-150 group">
<div class="w-12 h-12 rounded-full bg-tertiary-container/20 flex items-center justify-center mb-1">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</div>
<span class="font-label text-sm font-semibold">Sıfırla</span>
</button>
<!-- Artır Button -->
<button class="flex flex-col items-center justify-center gap-2 p-6 rounded-xl bg-primary-container bg-opacity-20 text-primary hover:bg-opacity-30 transition-all active:scale-95 duration-150 group">
<div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center mb-1 shadow-[0_4px_15px_rgba(75,226,119,0.3)]">
<span class="material-symbols-outlined text-on-primary" data-icon="add">add</span>
</div>
<span class="font-label text-sm font-semibold">Artır</span>
</button>
</div>
<!-- Metadata footer inside card -->
<div class="mt-12 flex justify-between w-full text-[10px] text-on-surface-variant opacity-40 font-body uppercase tracking-widest border-t border-outline-variant/10 pt-4">
<span>ID: sayac-app-10026</span>
<span>Son Güncelleme: Az önce</span>
</div>
</div>
<!-- Secondary Info Bento Grid -->
<div class="w-full max-w-md grid grid-cols-2 gap-4 mt-6">
<div class="bg-surface-container-low p-4 rounded-2xl flex flex-col gap-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="trending_up">trending_up</span>
<span class="font-label text-xs opacity-60">Hedef Değer</span>
<span class="font-headline text-lg">100</span>
</div>
<div class="bg-surface-container-low p-4 rounded-2xl flex flex-col gap-2">
<span class="material-symbols-outlined text-tertiary text-xl" data-icon="history">history</span>
<span class="font-label text-xs opacity-60">Bugünkü Artış</span>
<span class="font-headline text-lg">+12</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-3 px-4 bg-[#131318] z-50 rounded-t-xl border-t border-[#3d4a3d]/15 shadow-[0_-4px_20px_rgba(75,226,119,0.06)]">
<!-- Ana Sayfa (Active) -->
<a class="flex flex-col items-center justify-center text-[#4be277] font-bold transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-widest">Ana Sayfa</span>
</a>
<!-- Geçmiş -->
<a class="flex flex-col items-center justify-center text-[#c0c7d7] opacity-60 hover:text-[#4be277] transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-widest">Geçmiş</span>
</a>
<!-- Ayarlar -->
<a class="flex flex-col items-center justify-center text-[#c0c7d7] opacity-60 hover:text-[#4be277] transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-widest">Ayarlar</span>
</a>
</nav>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[20%] left-[-10%] w-[60%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[10%] right-[-10%] w-[50%] h-[40%] bg-secondary-container/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
